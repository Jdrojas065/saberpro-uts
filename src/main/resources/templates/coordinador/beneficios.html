<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Resolución Beneficios TyI · Coordinador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/saberpro.css}"/>
</head>
<body>
<div class="page-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar('beneficios')}"></div>
    <div class="main-wrapper">
        <div th:replace="~{fragments/header :: topbar('Resolución Beneficios Tecnología y Ingeniería')}"></div>
        <main class="content-area">

            <div th:if="${mensaje}" class="alert-box alert-success auto-hide">
                <i class="ti ti-check"></i><span th:text="${mensaje}"></span>
            </div>

            <div class="card-block">
                <p class="section-title">Resolución de Beneficios — Facultad de Tecnología e Ingeniería</p>
                <form th:action="@{/coordinador/beneficios/guardar}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:1rem; margin-bottom:1rem;">
                        <div>
                            <label style="font-size:12px; color:var(--text-secondary); display:block; margin-bottom:4px;">
                                Número de resolución
                            </label>
                            <input class="form-control" type="text" name="numero" placeholder="Ej: RES-2025-001" required/>
                        </div>
                        <div>
                            <label style="font-size:12px; color:var(--text-secondary); display:block; margin-bottom:4px;">
                                Fecha
                            </label>
                            <input class="form-control" type="date" name="fecha" required/>
                        </div>
                        <div>
                            <label style="font-size:12px; color:var(--text-secondary); display:block; margin-bottom:4px;">
                                Facultad
                            </label>
                            <input class="form-control" type="text" name="facultad" value="Tecnología e Ingeniería" readonly/>
                        </div>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label style="font-size:12px; color:var(--text-secondary); display:block; margin-bottom:4px;">
                            Descripción / Beneficios otorgados
                        </label>
                        <textarea class="form-control" name="descripcion" rows="6"
                                  placeholder="Detalle los beneficios para estudiantes de Tecnología e Ingeniería..."></textarea>
                    </div>
                    <button class="btn btn-secondary" type="submit">
                        <i class="ti ti-device-floppy"></i> Guardar Resolución
                    </button>
                </form>
            </div>

        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
