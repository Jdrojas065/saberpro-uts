<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Gestión de Pagos · Coordinador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/saberpro.css}"/>
</head>
<body>
<div class="page-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar('pagos')}"></div>
    <div class="main-wrapper">
        <div th:replace="~{fragments/header :: topbar('Gestión de Pagos')}"></div>
        <main class="content-area">

            <div th:if="${mensaje}" class="alert-box alert-success auto-hide">
                <i class="ti ti-check"></i><span th:text="${mensaje}"></span>
            </div>
            <div th:if="${error}" class="alert-box alert-danger auto-hide">
                <i class="ti ti-x"></i><span th:text="${error}"></span>
            </div>

            <!-- Stats -->
            <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);">
                <div class="stat-card">
                    <div class="stat-icon si-green"><i class="ti ti-receipt"></i></div>
                    <div class="stat-label">Con comprobante</div>
                    <div class="stat-value" th:text="${conComprobante}">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon si-gold"><i class="ti ti-clock"></i></div>
                    <div class="stat-label">Pendientes de aprobar</div>
                    <div class="stat-value" th:text="${pendientesAprobar}">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon si-red"><i class="ti ti-receipt-off"></i></div>
                    <div class="stat-label">Sin comprobante</div>
                    <div class="stat-value" th:text="${sinComprobante}">0</div>
                </div>
            </div>

            <!-- Filtros -->
            <div class="card-block" style="margin-bottom:1.5rem;">
                <p class="section-title">Filtrar pagos</p>
                <form th:action="@{/coordinador/pagos}" method="get"
                      style="display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end;">
                    <div>
                        <label style="font-size:12px; color:var(--text-secondary); display:block; margin-bottom:4px;">
                            <i class="ti ti-search"></i> Buscar
                        </label>
                        <input class="form-control" type="text" name="filtro"
                               th:value="${filtro}" placeholder="Nombre, apellido o documento"/>
                    </div>
                    <div>
                        <label style="font-size:12px; color:var(--text-secondary); display:block; margin-bottom:4px;">
                            <i class="ti ti-filter"></i> Estado
                        </label>
                        <select class="form-control" name="estado">
                            <option value="">Todos</option>
                            <option value="con_pago"  th:selected="${estadoFiltro == 'con_pago'}">Con comprobante</option>
                            <option value="sin_pago"  th:selected="${estadoFiltro == 'sin_pago'}">Sin comprobante</option>
                            <option value="pendiente" th:selected="${estadoFiltro == 'pendiente'}">Pendientes de aprobar</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" type="submit">
                        <i class="ti ti-search"></i> Buscar
                    </button>
                    <a th:href="@{/coordinador/pagos}" class="btn btn-secondary">
                        <i class="ti ti-refresh"></i> Limpiar
                    </a>
                </form>
            </div>

            <!-- Tabla -->
            <div class="card-block">
                <p class="section-title">Comprobantes de pago</p>
                <div style="overflow-x:auto;">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>Estudiante</th>
                            <th>Documento</th>
                            <th>Programa</th>
                            <th>Comprobante</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="est : ${estudiantes}">
                            <td>
                                <span th:text="${est.usuario.nombre + ' ' + est.usuario.apellido}"></span>
                            </td>
                            <td th:text="${est.documento}"></td>
                            <td th:text="${est.programa != null ? est.programa.nombre : '—'}"></td>
                            <td>
                                <span th:if="${est.comprobantePago == null or est.comprobantePago.isBlank()}"
                                      style="color:var(--text-secondary); font-size:13px;">
                                    <i class="ti ti-minus"></i> Sin subir
                                </span>
                                <a th:if="${est.comprobantePago != null and !est.comprobantePago.isBlank()}"
                                   th:href="@{'/uploads/comprobantes/' + ${est.comprobantePago}}"
                                   target="_blank"
                                   style="color:var(--primary); font-size:13px;">
                                    <i class="ti ti-file-download"></i>
                                    Ver comprobante
                                </a>
                            </td>
                            <td>
                                <span th:switch="${est.estadoInscripcion.name()}">
                                    <span th:case="'HABILITADO'"
                                          style="background:#d1fae5;color:#065f46;padding:2px 10px;border-radius:20px;font-size:12px;">
                                        <i class="ti ti-check"></i> Habilitado
                                    </span>
                                    <span th:case="'PENDIENTE'"
                                          style="background:#fef3c7;color:#92400e;padding:2px 10px;border-radius:20px;font-size:12px;">
                                        <i class="ti ti-clock"></i> Pendiente
                                    </span>
                                    <span th:case="'NO_HABILITADO'"
                                          style="background:#fee2e2;color:#991b1b;padding:2px 10px;border-radius:20px;font-size:12px;">
                                        <i class="ti ti-x"></i> No habilitado
                                    </span>
                                </span>
                            </td>
                            <td>
                                <!-- Solo mostrar acciones si tiene comprobante y está pendiente -->
                                <div th:if="${est.comprobantePago != null and !est.comprobantePago.isBlank() and est.estadoInscripcion.name() == 'PENDIENTE'}"
                                     style="display:flex; gap:0.5rem;">
                                    <form th:action="@{'/coordinador/pagos/' + ${est.id} + '/aprobar'}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button class="btn btn-primary" type="submit"
                                                style="padding:4px 12px; font-size:12px;"
                                                onclick="return confirm('¿Aprobar el pago de este estudiante?')">
                                            <i class="ti ti-check"></i> Aprobar
                                        </button>
                                    </form>
                                    <form th:action="@{'/coordinador/pagos/' + ${est.id} + '/rechazar'}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button class="btn btn-danger" type="submit"
                                                style="padding:4px 12px; font-size:12px;"
                                                onclick="return confirm('¿Rechazar el comprobante de este estudiante?')">
                                            <i class="ti ti-x"></i> Rechazar
                                        </button>
                                    </form>
                                </div>
                                <span th:if="${est.comprobantePago == null or est.comprobantePago.isBlank()}"
                                      style="color:var(--text-secondary); font-size:12px;">—</span>
                                <span th:if="${est.comprobantePago != null and !est.comprobantePago.isBlank() and est.estadoInscripcion.name() != 'PENDIENTE'}"
                                      style="color:var(--text-secondary); font-size:12px;">Procesado</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(estudiantes)}">
                            <td colspan="6" style="text-align:center; color:var(--text-secondary); padding:2rem;">
                                <i class="ti ti-search-off"></i> No se encontraron registros
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>
</body>
</html>
