<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Resultado Detallado · Estudiante</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/saberpro.css}"/>
</head>
<body>
<div class="page-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar('mis-resultados')}"></div>
    <div class="main-wrapper">
        <div th:replace="~{fragments/header :: topbar('Resultado Detallado Saber Pro')}"></div>
        <main class="content-area">

            <!-- Sin resultado (acceso directo con id inválido) -->
            <div th:unless="${resultado != null}" class="card-block" style="text-align:center; padding:3rem;">
                <i class="ti ti-alert-circle" style="font-size:48px; color:var(--border-secondary); display:block; margin-bottom:12px;"></i>
                <div style="font-weight:600; color:var(--text-secondary);">Resultado no encontrado.</div>
                <a th:href="@{/estudiante/mis-resultados}" class="btn btn-secondary" style="margin-top:16px;">
                    <i class="ti ti-arrow-left"></i> Volver
                </a>
            </div>

            <!-- Con resultado -->
            <div th:if="${resultado != null}">

                <!-- Puntaje global -->
                <div class="card-block" style="background:var(--uts-green); text-align:center; padding:2rem; margin-bottom:1.5rem;">
                    <i class="ti ti-trophy" style="font-size:44px; color:rgba(255,255,255,.9); display:block; margin-bottom:10px;"></i>
                    <div style="font-size:13px; color:rgba(255,255,255,.8); margin-bottom:6px;">Puntaje Global</div>
                    <div style="font-size:56px; font-weight:700; color:white; line-height:1; margin-bottom:8px;"
                         th:text="${resultado.puntaje}">—</div>
                    <span style="display:inline-block; background:rgba(0,0,0,.20); color:white; border-radius:20px;
                                 padding:4px 20px; font-size:13px; font-style:italic; font-weight:500; margin-bottom:12px;"
                          th:text="${nivel}">—</span>
                    <div th:if="${resultado.fecha != null}"
                         style="font-size:12px; color:rgba(255,255,255,.75); display:flex; align-items:center; justify-content:center; gap:6px;">
                        <i class="ti ti-calendar"></i>
                        Fecha del examen:
                        <strong th:text="${#temporals.format(resultado.fecha,'dd/MM/yyyy')}">—</strong>
                    </div>
                    <div th:if="${resultado.simulacro != null}"
                         style="font-size:12px; color:rgba(255,255,255,.75); margin-top:4px;"
                         th:text="${resultado.simulacro.nombre}">—</div>
                </div>

                <!-- Puntaje por competencia -->
                <p class="section-title">Puntaje por Competencia</p>
                <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);">
                    <div class="stat-card" th:if="${resultado.puntajeComunicacionEscrita != null}">
                        <div class="stat-icon si-red"><i class="ti ti-pencil"></i></div>
                        <div class="stat-label">Comunicación Escrita</div>
                        <div class="stat-value" th:text="${resultado.puntajeComunicacionEscrita}">—</div>
                        <div style="font-size:11px; color:var(--text-tertiary); margin-top:4px;"
                             th:text="${resultado.puntajeComunicacionEscrita >= 241 ? 'Superior' :
                                       (resultado.puntajeComunicacionEscrita >= 201 ? 'Alto' :
                                       (resultado.puntajeComunicacionEscrita >= 161 ? 'Medio' : 'Bajo'))}">—</div>
                    </div>
                    <div class="stat-card" th:if="${resultado.puntajeRazonamientoCuantitativo != null}">
                        <div class="stat-icon si-blue"><i class="ti ti-calculator"></i></div>
                        <div class="stat-label">Razonamiento Cuantitativo</div>
                        <div class="stat-value" th:text="${resultado.puntajeRazonamientoCuantitativo}">—</div>
                        <div style="font-size:11px; color:var(--text-tertiary); margin-top:4px;"
                             th:text="${resultado.puntajeRazonamientoCuantitativo >= 241 ? 'Superior' :
                                       (resultado.puntajeRazonamientoCuantitativo >= 201 ? 'Alto' :
                                       (resultado.puntajeRazonamientoCuantitativo >= 161 ? 'Medio' : 'Bajo'))}">—</div>
                    </div>
                    <div class="stat-card" th:if="${resultado.puntajeLecturaCritica != null}">
                        <div class="stat-icon si-gold"><i class="ti ti-book"></i></div>
                        <div class="stat-label">Lectura Crítica</div>
                        <div class="stat-value" th:text="${resultado.puntajeLecturaCritica}">—</div>
                        <div style="font-size:11px; color:var(--text-tertiary); margin-top:4px;"
                             th:text="${resultado.puntajeLecturaCritica >= 241 ? 'Superior' :
                                       (resultado.puntajeLecturaCritica >= 201 ? 'Alto' :
                                       (resultado.puntajeLecturaCritica >= 161 ? 'Medio' : 'Bajo'))}">—</div>
                    </div>
                </div>
                <div class="stats-grid" style="grid-template-columns:repeat(2,1fr); margin-top:0;">
                    <div class="stat-card" th:if="${resultado.puntajeCompetenciasCiudadanas != null}">
                        <div class="stat-icon si-green"><i class="ti ti-users"></i></div>
                        <div class="stat-label">Competencias Ciudadanas</div>
                        <div class="stat-value" th:text="${resultado.puntajeCompetenciasCiudadanas}">—</div>
                        <div style="font-size:11px; color:var(--text-tertiary); margin-top:4px;"
                             th:text="${resultado.puntajeCompetenciasCiudadanas >= 241 ? 'Superior' :
                                       (resultado.puntajeCompetenciasCiudadanas >= 201 ? 'Alto' :
                                       (resultado.puntajeCompetenciasCiudadanas >= 161 ? 'Medio' : 'Bajo'))}">—</div>
                    </div>
                    <div class="stat-card" th:if="${resultado.puntajeIngles != null}">
                        <div class="stat-icon si-blue"><i class="ti ti-language"></i></div>
                        <div class="stat-label">Inglés</div>
                        <div class="stat-value" th:text="${resultado.puntajeIngles}">—</div>
                        <div style="font-size:11px; color:var(--text-tertiary); margin-top:4px;"
                             th:text="${nivelIngles != null ? nivelIngles : '—'}">—</div>
                    </div>
                </div>

                <!-- Botón volver -->
                <div style="margin-top:1.5rem;">
                    <a th:href="@{/estudiante/mis-resultados}" class="btn btn-secondary">
                        <i class="ti ti-arrow-left"></i> Volver a mis Resultados
                    </a>
                </div>

            </div>
        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
