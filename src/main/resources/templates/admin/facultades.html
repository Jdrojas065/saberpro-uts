<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Facultades · Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/saberpro.css}"/>
</head>
<body>
<div style="display:flex; min-height:100vh;">
    <div th:replace="~{fragments/sidebar :: sidebar('facultades')}"></div>
    <div class="main-wrapper">
        <div th:replace="~{fragments/header :: topbar('Gestión de Facultades')}"></div>
        <main class="content-area">

            <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
            <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

            <div class="card-block" style="margin-bottom:1.5rem;">
                <p class="section-title">Nueva Facultad</p>
                <form th:action="@{/admin/facultades/nuevo}" method="post"
                      style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div>
                        <label>Nombre</label>
                        <input class="form-control" type="text" name="nombre" placeholder="Nombre de la facultad" required/>
                    </div>
                    <div>
                        <label>Código</label>
                        <input class="form-control" type="text" name="codigo" placeholder="Código" required/>
                    </div>
                    <button class="btn-primary" type="submit">
                        <i class="ti ti-plus"></i> Agregar
                    </button>
                </form>
            </div>

            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Código</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="f, i : ${facultades}">
                            <td th:text="${i.count}">1</td>
                            <td th:text="${f.nombre}">—</td>
                            <td th:text="${f.codigo}">—</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${f.activo} ? 'b-green' : 'b-red'"
                                      th:text="${f.activo} ? 'Activa' : 'Inactiva'">—</span>
                            </td>
                            <td style="display:flex;gap:.5rem;">
                                <form th:action="@{'/admin/facultades/' + ${f.id} + '/eliminar'}"
                                      method="post" style="display:inline;"
                                      onsubmit="return confirm('¿Eliminar facultad?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn-danger" type="submit">
                                        <i class="ti ti-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${facultades == null or #lists.isEmpty(facultades)}">
                            <td colspan="5" style="text-align:center;color:#888;">
                                No hay facultades registradas.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
