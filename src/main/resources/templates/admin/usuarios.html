<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Usuarios · Saber Pro UTS</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/saberpro.css}"/>
</head>
<body>
<div style="display:flex; min-height:100vh;">
    <div th:replace="~{fragments/sidebar :: sidebar('usuarios')}"></div>

    <div class="main-wrapper">
        <div th:replace="~{fragments/header :: topbar('Gestión de Usuarios')}"></div>

        <main class="content-area">

            <!-- Alerta flash -->
            <div th:if="${mensaje}" class="alert-box alert-success auto-hide">
                <i class="ti ti-check"></i>
                <span th:text="${mensaje}"></span>
            </div>
            <div th:if="${error}" class="alert-box alert-danger auto-hide">
                <i class="ti ti-alert-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <div class="two-cols" style="align-items:start;">

                <!-- Tabla de usuarios -->
                <div style="grid-column: span 1;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <p class="section-title" style="margin:0;">Usuarios registrados</p>
                        <span class="badge b-blue" th:text="${usuarios.size()} + ' en total'">0 en total</span>
                    </div>
                    <div class="table-card">
                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Nombre</th>
                                    <th>Correo</th>
                                    <th>Rol</th>
                                    <th>Estado</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u, i : ${usuarios}">
                                    <td th:text="${i.count}">1</td>
                                    <td th:text="${u.nombre + ' ' + u.apellido}">—</td>
                                    <td th:text="${u.email}">—</td>
                                    <td>
                                        <span th:text="${u.rol.tipo.name()}"
                                              th:class="${u.rol.tipo.name() == 'ADMIN'} ? 'badge b-gold' :
                                                         (${u.rol.tipo.name() == 'DOCENTE'} ? 'badge b-green' :
                                                         (${u.rol.tipo.name() == 'COORDINADOR'} ? 'badge b-blue' : 'badge b-red'))">
                                        </span>
                                    </td>
                                    <td>
                                        <span th:if="${u.activo}"  class="badge b-green">Activo</span>
                                        <span th:unless="${u.activo}" class="badge b-red">Inactivo</span>
                                    </td>
                                    <td>
                                        <form th:action="@{/admin/usuarios/{id}/toggle(id=${u.id})}"
                                              method="post" style="display:inline;">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-outline"
                                                    style="padding:4px 10px; font-size:11px;"
                                                    th:text="${u.activo} ? 'Desactivar' : 'Activar'">
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(usuarios)}">
                                    <td colspan="6" style="text-align:center; color:var(--text-tertiary);">
                                        Sin usuarios registrados
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Formulario nuevo usuario -->
                <div>
                    <p class="section-title">Nuevo usuario</p>
                    <div class="form-card">
                        <form th:action="@{/admin/usuarios/nuevo}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                            <div class="two-cols" style="gap:10px;">
                                <div class="form-group">
                                    <label>Nombre</label>
                                    <input type="text" name="nombre" placeholder="Ej. Juan" required/>
                                </div>
                                <div class="form-group">
                                    <label>Apellido</label>
                                    <input type="text" name="apellido" placeholder="Ej. Pérez" required/>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Correo electrónico</label>
                                <input type="email" name="email" placeholder="usuario@uts.edu.co" required/>
                            </div>

                            <div class="form-group">
                                <label>Contraseña</label>
                                <input type="password" name="password" placeholder="••••••••" required/>
                            </div>

                            <div class="form-group">
                                <label>Rol</label>
                                <select name="rolId" required>
                                    <option value="">Seleccionar rol...</option>
                                    <option th:each="rol : ${roles}"
                                            th:value="${rol.id}"
                                            th:text="${rol.nombre}">Rol</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-secondary" style="width:100%;">
                                <i class="ti ti-user-plus"></i> Crear usuario
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
