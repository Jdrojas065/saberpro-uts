<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Beneficios TyI · Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/saberpro.css}"/>
</head>
<body>
<div style="display:flex; min-height:100vh;">
    <div th:replace="~{fragments/sidebar :: sidebar('beneficios')}"></div>
    <div class="main-wrapper">
        <div th:replace="~{fragments/header :: topbar('Resolución Beneficios Tecnología y Ingeniería')}"></div>
        <main class="content-area">

            <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

            <div class="card-block">
                <p class="section-title">Resolución de Beneficios — Facultad de Tecnología e Ingeniería</p>
                <form th:action="@{/admin/beneficios/guardar}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div style="margin-bottom:1rem;">
                        <label>Número de resolución</label>
                        <input class="form-control" type="text" name="numero"
                               placeholder="Ej: RES-2025-001" required/>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label>Fecha</label>
                        <input class="form-control" type="date" name="fecha" required/>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label>Facultad</label>
                        <input class="form-control" type="text" name="facultad"
                               value="Tecnología e Ingeniería" readonly/>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label>Descripción / Beneficios otorgados</label>
                        <textarea class="form-control" name="descripcion" rows="6"
                                  placeholder="Detalle los beneficios para estudiantes de Tecnología e Ingeniería..."></textarea>
                    </div>

                    <button class="btn-primary" type="submit">
                        <i class="ti ti-device-floppy"></i> Guardar Resolución
                    </button>
                </form>
            </div>

        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
