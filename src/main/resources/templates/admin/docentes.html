<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Docentes · Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/saberpro.css}"/>
</head>
<body>
<div style="display:flex; min-height:100vh;">
    <div th:replace="~{fragments/sidebar :: sidebar('docentes')}"></div>
    <div class="main-wrapper">
        <div th:replace="~{fragments/header :: topbar('Gestión de Docentes')}"></div>
        <main class="content-area">

            <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
            <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

            <!-- Formulario nuevo -->
            <div class="card-block" style="margin-bottom:1.5rem;">
                <p class="section-title">Nuevo Docente</p>
                <form th:action="@{/admin/docentes/nuevo}" method="post"
                      style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div>
                        <label>Nombre</label>
                        <input class="form-control" type="text" name="nombre" placeholder="Nombre" required/>
                    </div>
                    <div>
                        <label>Apellido</label>
                        <input class="form-control" type="text" name="apellido" placeholder="Apellido" required/>
                    </div>
                    <div>
                        <label>Correo</label>
                        <input class="form-control" type="email" name="email" placeholder="correo@uts.edu.co" required/>
                    </div>
                    <div>
                        <label>Contraseña</label>
                        <input class="form-control" type="password" name="password" placeholder="Contraseña" required/>
                    </div>
                    <button class="btn-primary" type="submit">
                        <i class="ti ti-plus"></i> Agregar
                    </button>
                </form>
            </div>

            <!-- Tabla -->
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nombre completo</th>
                            <th>Correo</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u, i : ${usuarios}">
                            <td th:text="${i.count}">1</td>
                            <td th:text="${u.nombre + ' ' + u.apellido}">—</td>
                            <td th:text="${u.email}">—</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${u.activo} ? 'b-green' : 'b-red'"
                                      th:text="${u.activo} ? 'Activo' : 'Inactivo'">—</span>
                            </td>
                            <td style="display:flex;gap:.5rem;">
                                <!-- Eliminar -->
                                <form th:action="@{'/admin/docentes/' + ${u.id} + '/eliminar'}"
                                      method="post" style="display:inline;"
                                      onsubmit="return confirm('¿Eliminar docente?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn-danger" type="submit">
                                        <i class="ti ti-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(usuarios)}">
                            <td colspan="5" style="text-align:center;color:#888;">
                                No hay docentes registrados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
