<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Programas · Saber Pro UTS</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/saberpro.css}"/>
</head>
<body>
<div style="display:flex; min-height:100vh;">
    <div th:replace="~{fragments/sidebar :: sidebar('programas')}"></div>

    <div class="main-wrapper">
        <div th:replace="~{fragments/header :: topbar('Programas Académicos')}"></div>

        <main class="content-area">

            <div th:if="${mensaje}" class="alert-box alert-success auto-hide">
                <i class="ti ti-check"></i>
                <span th:text="${mensaje}"></span>
            </div>

            <div class="two-cols" style="align-items:start;">

                <!-- Lista de programas -->
                <div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <p class="section-title" style="margin:0;">Programas registrados</p>
                        <span class="badge b-green" th:text="${programas.size()} + ' programas'">0</span>
                    </div>
                    <div class="table-card">
                        <table>
                            <thead>
                                <tr><th>#</th><th>Nombre</th><th>Código</th><th>Estado</th><th>Acción</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="p, i : ${programas}">
                                    <td th:text="${i.count}">1</td>
                                    <td th:text="${p.nombre}">—</td>
                                    <td><span class="badge b-blue" th:text="${p.codigo}">—</span></td>
                                    <td>
                                        <span th:if="${p.activo}"    class="badge b-green">Activo</span>
                                        <span th:unless="${p.activo}" class="badge b-red">Inactivo</span>
                                    </td>
                                    <td>
                                        <form th:action="@{/admin/programas/{id}/toggle(id=${p.id})}"
                                              method="post" style="display:inline;">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-outline"
                                                    style="padding:4px 10px; font-size:11px;"
                                                    th:text="${p.activo} ? 'Desactivar' : 'Activar'">
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(programas)}">
                                    <td colspan="5" style="text-align:center; color:var(--text-tertiary);">
                                        Sin programas registrados
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Formulario nuevo programa -->
                <div>
                    <p class="section-title">Nuevo programa</p>
                    <div class="form-card">
                        <form th:action="@{/admin/programas/nuevo}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                            <div class="form-group">
                                <label>Nombre del programa</label>
                                <input type="text" name="nombre"
                                       placeholder="Ej. Ingeniería de Sistemas" required/>
                            </div>

                            <div class="form-group">
                                <label>Código</label>
                                <input type="text" name="codigo"
                                       placeholder="Ej. ISI" maxlength="10" required/>
                            </div>

                            <button type="submit" class="btn btn-secondary" style="width:100%;">
                                <i class="ti ti-plus"></i> Registrar programa
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
