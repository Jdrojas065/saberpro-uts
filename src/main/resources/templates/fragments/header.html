<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="topbar(title)" class="topbar">

    <button id="menu-toggle" class="btn-outline"
            style="display:none;padding:6px 8px;border-radius:6px;" aria-label="Abrir menú">
        <i class="ti ti-menu-2" style="font-size:18px;"></i>
    </button>

    <span class="topbar-title" th:text="${title}">Dashboard</span>

    <div class="topbar-right">
        <span sec:authorize="hasRole('ADMIN')"       class="badge-role badge b-gold">Administrador</span>
        <span sec:authorize="hasRole('COORDINADOR')" class="badge-role badge b-blue">Coordinador</span>
        <span sec:authorize="hasRole('DOCENTE')"     class="badge-role badge b-green">Docente</span>
        <span sec:authorize="hasRole('ESTUDIANTE')"  class="badge-role badge b-red">Estudiante</span>

        <i class="ti ti-bell topbar-icon"></i>

        <div style="position:relative;">
            <!-- Avatar botón -->
            <div id="avatarBtn"
                 style="width:34px;height:34px;border-radius:50%;background:var(--uts-green);
                        display:flex;align-items:center;justify-content:center;color:white;
                        font-size:13px;font-weight:600;cursor:pointer;user-select:none;
                        transition:opacity .15s;"
                 th:title="${#authentication.name}">
                <span th:text="${#strings.toUpperCase(#strings.substring(#authentication.name,0,1))}">U</span>
            </div>

            <!-- Dropdown -->
            <div id="avatarDropdown"
                 style="display:none;position:absolute;top:calc(100% + 10px);right:0;
                        width:230px;background:var(--bg-primary);
                        border:0.5px solid var(--border-tertiary);
                        border-radius:var(--radius-lg);box-shadow:var(--shadow-md);
                        z-index:999;overflow:hidden;">

                <!-- Cabecera con nombre y email -->
                <div style="display:flex;align-items:center;gap:10px;padding:14px;
                            background:var(--bg-secondary);
                            border-bottom:0.5px solid var(--border-tertiary);">
                    <div style="width:38px;height:38px;border-radius:50%;
                                background:var(--uts-green);display:flex;align-items:center;
                                justify-content:center;color:white;font-size:15px;
                                font-weight:700;flex-shrink:0;"
                         th:text="${#strings.toUpperCase(#strings.substring(usuario.nombre,0,1))}">U</div>
                    <div style="overflow:hidden;">
                        <div style="font-size:13px;font-weight:600;color:var(--text-primary);
                                    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
                             th:text="${usuario.nombre + ' ' + usuario.apellido}">Usuario</div>
                        <div style="font-size:11px;color:var(--text-tertiary);
                                    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
                             th:text="${usuario.email}">email</div>
                    </div>
                </div>

                <!-- Enlace Mi perfil según rol -->
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/perfil}"
                   style="display:flex;align-items:center;gap:10px;padding:11px 14px;
                          font-size:13px;color:var(--text-primary);text-decoration:none;"
                   onmouseover="this.style.background='var(--bg-secondary)'"
                   onmouseout="this.style.background='transparent'">
                    <i class="ti ti-user-edit" style="font-size:16px;color:var(--text-secondary);"></i>
                    Mi perfil
                </a>
                <a sec:authorize="hasRole('COORDINADOR')" th:href="@{/coordinador/perfil}"
                   style="display:flex;align-items:center;gap:10px;padding:11px 14px;
                          font-size:13px;color:var(--text-primary);text-decoration:none;"
                   onmouseover="this.style.background='var(--bg-secondary)'"
                   onmouseout="this.style.background='transparent'">
                    <i class="ti ti-user-edit" style="font-size:16px;color:var(--text-secondary);"></i>
                    Mi perfil
                </a>
                <a sec:authorize="hasRole('DOCENTE')" th:href="@{/docente/perfil}"
                   style="display:flex;align-items:center;gap:10px;padding:11px 14px;
                          font-size:13px;color:var(--text-primary);text-decoration:none;"
                   onmouseover="this.style.background='var(--bg-secondary)'"
                   onmouseout="this.style.background='transparent'">
                    <i class="ti ti-user-edit" style="font-size:16px;color:var(--text-secondary);"></i>
                    Mi perfil
                </a>
                <a sec:authorize="hasRole('ESTUDIANTE')" th:href="@{/estudiante/perfil}"
                   style="display:flex;align-items:center;gap:10px;padding:11px 14px;
                          font-size:13px;color:var(--text-primary);text-decoration:none;"
                   onmouseover="this.style.background='var(--bg-secondary)'"
                   onmouseout="this.style.background='transparent'">
                    <i class="ti ti-user-edit" style="font-size:16px;color:var(--text-secondary);"></i>
                    Mi perfil
                </a>

                <!-- Divisor -->
                <div style="height:0.5px;background:var(--border-tertiary);"></div>

                <!-- Cerrar sesión -->
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            style="display:flex;align-items:center;gap:10px;padding:11px 14px;
                                   width:100%;background:none;border:none;font-family:inherit;
                                   font-size:13px;color:var(--uts-red);cursor:pointer;text-align:left;"
                            onmouseover="this.style.background='var(--uts-red-light)'"
                            onmouseout="this.style.background='transparent'">
                        <i class="ti ti-logout" style="font-size:16px;"></i>
                        Cerrar sesión
                    </button>
                </form>
            </div>
        </div>
    </div>

    <style>
        @media(max-width:768px){ #menu-toggle { display:flex !important; } }
        #avatarBtn:hover { opacity:.85; }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var btn      = document.getElementById('avatarBtn');
            var dropdown = document.getElementById('avatarDropdown');
            if (!btn || !dropdown) return;
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
            });
            document.addEventListener('click', function(e) {
                if (!dropdown.contains(e.target) && e.target !== btn) {
                    dropdown.style.display = 'none';
                }
            });
        });
    </script>

</header>
</body>
</html>
