<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Banco de Preguntas · Docente</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/saberpro.css}"/>
</head>
<body>
<div class="page-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar('banco')}"></div>
    <div class="main-wrapper">
        <div th:replace="~{fragments/header :: topbar('Banco de Preguntas')}"></div>
        <main class="content-area">

            <div th:if="${mensaje}" class="alert-box alert-success auto-hide">
                <i class="ti ti-check"></i><span th:text="${mensaje}"></span>
            </div>

            <div class="two-cols" style="align-items:start;">

                <!-- Lista preguntas -->
                <div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                        <p class="section-title" style="margin:0;">Preguntas registradas</p>
                        <span class="badge b-blue" th:text="${totalPreguntas} + ' preguntas'">0</span>
                    </div>
                    <div class="table-card">
                        <table>
                            <thead>
                                <tr><th>#</th><th>Enunciado</th><th>Competencia</th><th>Simulacro</th><th>Resp.</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="p, i : ${preguntas}">
                                    <td th:text="${i.count}">1</td>
                                    <td style="max-width:200px;">
                                        <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;"
                                             th:text="${p.enunciado}">—</div>
                                    </td>
                                    <td>
                                        <span th:if="${p.competencia != null}"
                                              th:text="${p.competencia}" class="badge b-green">—</span>
                                        <span th:unless="${p.competencia != null}"
                                              style="color:var(--text-tertiary);font-size:12px;">—</span>
                                    </td>
                                    <td style="font-size:12px;color:var(--text-secondary);"
                                        th:text="${p.simulacro != null ? p.simulacro.nombre : '—'}">—</td>
                                    <td>
                                        <span class="badge b-gold" th:text="${p.respuestaCorrecta}">—</span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(preguntas)}">
                                    <td colspan="5" style="text-align:center;color:var(--text-tertiary);">
                                        Sin preguntas registradas
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Formulario nueva pregunta -->
                <div>
                    <p class="section-title">Nueva pregunta</p>
                    <div class="form-card">
                        <form th:action="@{/docente/banco-preguntas/nueva}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                            <div class="form-group">
                                <label>Simulacro</label>
                                <select name="simulacroId" required>
                                    <option value="">Seleccionar simulacro...</option>
                                    <option th:each="s : ${simulacros}"
                                            th:value="${s.id}"
                                            th:text="${s.nombre}">Simulacro</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Enunciado</label>
                                <textarea name="enunciado" rows="3" required
                                          placeholder="Escribe la pregunta..."
                                          style="resize:vertical;"></textarea>
                            </div>

                            <div class="two-cols" style="gap:8px;">
                                <div class="form-group">
                                    <label>Opción A</label>
                                    <input type="text" name="opcionA" required/>
                                </div>
                                <div class="form-group">
                                    <label>Opción B</label>
                                    <input type="text" name="opcionB" required/>
                                </div>
                                <div class="form-group">
                                    <label>Opción C</label>
                                    <input type="text" name="opcionC" required/>
                                </div>
                                <div class="form-group">
                                    <label>Opción D</label>
                                    <input type="text" name="opcionD" required/>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Respuesta correcta</label>
                                <select name="respuestaCorrecta" required>
                                    <option value="">Seleccionar...</option>
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Competencia</label>
                                <select name="competencia">
                                    <option value="">Sin clasificar</option>
                                    <option value="Lectura Crítica">Lectura Crítica</option>
                                    <option value="Razonamiento Cuantitativo">Razonamiento Cuantitativo</option>
                                    <option value="Competencias Ciudadanas">Competencias Ciudadanas</option>
                                    <option value="Comunicación Escrita">Comunicación Escrita</option>
                                    <option value="Inglés">Inglés</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-secondary" style="width:100%;">
                                <i class="ti ti-plus"></i> Agregar pregunta
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
