<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mi Perfil · Docente</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/saberpro.css}"/>
</head>
<body>
<div class="page-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar('perfil')}"></div>
    <div class="main-wrapper">
        <div th:replace="~{fragments/header :: topbar('Mi Perfil')}"></div>
        <main class="content-area">

            <div th:if="${mensaje}" class="alert-box alert-success auto-hide">
                <i class="ti ti-check"></i><span th:text="${mensaje}"></span>
            </div>
            <div th:if="${error}" class="alert-box alert-danger auto-hide">
                <i class="ti ti-alert-circle"></i><span th:text="${error}"></span>
            </div>

            <div class="two-cols" style="align-items:start;">

                <!-- Info actual -->
                <div>
                    <p class="section-title">Información actual</p>
                    <div class="card-block">
                        <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
                            <div style="width:60px;height:60px;border-radius:50%;
                                        background:var(--uts-green);display:flex;align-items:center;
                                        justify-content:center;color:white;font-size:22px;
                                        font-weight:700;flex-shrink:0;"
                                 th:text="${#strings.toUpperCase(#strings.substring(usuario.nombre,0,1))}">D</div>
                            <div>
                                <div style="font-size:16px;font-weight:600;"
                                     th:text="${usuario.nombre + ' ' + usuario.apellido}">—</div>
                                <div style="font-size:13px;color:var(--text-secondary);"
                                     th:text="${usuario.email}">—</div>
                                <span class="badge b-green" style="margin-top:4px;"
                                      th:text="${usuario.rol.nombre}">—</span>
                            </div>
                        </div>
                        <div class="divider"></div>
                        <div style="display:flex;flex-direction:column;gap:10px;font-size:13px;margin-top:12px;">
                            <div style="display:flex;justify-content:space-between;">
                                <span style="color:var(--text-secondary);">Nombre:</span>
                                <strong th:text="${usuario.nombre}">—</strong>
                            </div>
                            <div style="display:flex;justify-content:space-between;">
                                <span style="color:var(--text-secondary);">Apellido:</span>
                                <strong th:text="${usuario.apellido}">—</strong>
                            </div>
                            <div style="display:flex;justify-content:space-between;">
                                <span style="color:var(--text-secondary);">Correo:</span>
                                <strong th:text="${usuario.email}">—</strong>
                            </div>
                            <div style="display:flex;justify-content:space-between;">
                                <span style="color:var(--text-secondary);">Rol:</span>
                                <strong th:text="${usuario.rol.nombre}">—</strong>
                            </div>
                            <div style="display:flex;justify-content:space-between;">
                                <span style="color:var(--text-secondary);">Estado:</span>
                                <span th:if="${usuario.activo}"  class="badge b-green">Activo</span>
                                <span th:unless="${usuario.activo}" class="badge b-red">Inactivo</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Formularios edición -->
                <div style="display:flex;flex-direction:column;gap:16px;">
                    <div>
                        <p class="section-title">Editar datos personales</p>
                        <div class="form-card">
                            <form th:action="@{/docente/perfil/datos}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <div class="two-cols" style="gap:10px;">
                                    <div class="form-group">
                                        <label>Nombre</label>
                                        <input type="text" name="nombre"
                                               th:value="${usuario.nombre}" required/>
                                    </div>
                                    <div class="form-group">
                                        <label>Apellido</label>
                                        <input type="text" name="apellido"
                                               th:value="${usuario.apellido}" required/>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Correo electrónico</label>
                                    <input type="email" name="email"
                                           th:value="${usuario.email}" required/>
                                </div>
                                <button type="submit" class="btn btn-secondary" style="width:100%;">
                                    <i class="ti ti-user-check"></i> Guardar cambios
                                </button>
                            </form>
                        </div>
                    </div>
                    <div>
                        <p class="section-title">Cambiar contraseña</p>
                        <div class="form-card">
                            <form th:action="@{/docente/perfil/password}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <div class="form-group">
                                    <label>Nueva contraseña</label>
                                    <input type="password" name="passwordNueva"
                                           placeholder="••••••••" required minlength="6"/>
                                </div>
                                <div class="form-group">
                                    <label>Confirmar contraseña</label>
                                    <input type="password" name="passwordConfirm"
                                           placeholder="••••••••" required minlength="6"/>
                                </div>
                                <button type="submit" class="btn btn-primary" style="width:100%;">
                                    <i class="ti ti-lock"></i> Cambiar contraseña
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
