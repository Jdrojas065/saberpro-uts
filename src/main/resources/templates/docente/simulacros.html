<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Simulacros · Docente</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/saberpro.css}"/>
</head>
<body>
<div class="page-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar('simulacros')}"></div>
    <div class="main-wrapper">
        <div th:replace="~{fragments/header :: topbar('Simulacros')}"></div>
        <main class="content-area">

            <div th:if="${mensaje}" class="alert-box alert-success auto-hide">
                <i class="ti ti-check"></i><span th:text="${mensaje}"></span>
            </div>
            <div th:if="${error}" class="alert-box alert-danger auto-hide">
                <i class="ti ti-alert-circle"></i><span th:text="${error}"></span>
            </div>

            <div class="two-cols" style="align-items:start;">

                <!-- Lista de simulacros -->
                <div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                        <p class="section-title" style="margin:0;">Mis simulacros</p>
                        <span class="badge b-blue" th:text="${total} + ' simulacros'">0</span>
                    </div>
                    <div class="table-card">
                        <table>
                            <thead>
                                <tr><th>#</th><th>Nombre</th><th>Descripción</th><th>Creado</th><th>Estado</th><th>Acción</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="s, i : ${simulacros}">
                                    <td th:text="${i.count}">1</td>
                                    <td style="font-weight:500;" th:text="${s.nombre}">—</td>
                                    <td style="font-size:12px;color:var(--text-secondary);"
                                        th:text="${s.descripcion != null ? s.descripcion : '—'}">—</td>
                                    <td style="font-size:12px;color:var(--text-tertiary);"
                                        th:text="${#temporals.format(s.fechaCreacion,'dd/MM/yyyy')}">—</td>
                                    <td>
                                        <span th:if="${s.activo}"    class="badge b-green">Activo</span>
                                        <span th:unless="${s.activo}" class="badge b-red">Inactivo</span>
                                    </td>
                                    <td>
                                        <form th:action="@{/docente/simulacros/{id}/toggle(id=${s.id})}"
                                              method="post" style="display:inline;">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-outline"
                                                    style="padding:4px 10px;font-size:11px;"
                                                    th:text="${s.activo} ? 'Desactivar' : 'Activar'">
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(simulacros)}">
                                    <td colspan="6" style="text-align:center;color:var(--text-tertiary);">
                                        Sin simulacros creados
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Formulario nuevo simulacro -->
                <div>
                    <p class="section-title">Nuevo simulacro</p>
                    <div class="form-card">
                        <form th:action="@{/docente/simulacros/nuevo}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                            <div class="form-group">
                                <label>Nombre del simulacro</label>
                                <input type="text" name="nombre"
                                       placeholder="Ej. Simulacro Saber Pro 2025-1" required/>
                            </div>

                            <div class="form-group">
                                <label>Descripción</label>
                                <textarea name="descripcion" rows="3"
                                          placeholder="Describe el contenido del simulacro..."
                                          style="resize:vertical;"></textarea>
                            </div>

                            <button type="submit" class="btn btn-secondary" style="width:100%;">
                                <i class="ti ti-plus"></i> Crear simulacro
                            </button>
                        </form>
                    </div>

                    <p class="section-title" style="margin-top:1rem;">Acciones rápidas</p>
                    <div class="card-block">
                        <div style="display:flex;flex-direction:column;gap:8px;">
                            <a th:href="@{/docente/banco-preguntas}"
                               class="btn btn-outline" style="justify-content:flex-start;">
                                <i class="ti ti-books"></i> Ir al banco de preguntas
                            </a>
                            <a th:href="@{/docente/resultados}"
                               class="btn btn-outline" style="justify-content:flex-start;">
                                <i class="ti ti-chart-bar"></i> Ver resultados
                            </a>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
